<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f5f5f0;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <h2 style="font-size: 28pt; font-weight: 600; color: #1a1a1a;">현재 진행 상황</h2>
    <p style="font-size: 10pt; color: #999;">05</p>
  </div>

  <!-- 통계 카드 그리드 -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20pt; margin-bottom: 20pt;">
    <div style="background: #1a1a1a; border-radius: 12pt; padding: 24pt; display: flex; flex-direction: column; justify-content: space-between;">
      <p style="font-size: 9pt; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">MILESTONES</p>
      <div>
        <p style="font-size: 44pt; font-weight: 600; color: #ffffff; letter-spacing: -0.02em;">42<span style="font-size: 20pt; color: #666;">/76</span></p>
        <p style="font-size: 10pt; color: #666; margin-top: 6pt;">55% 완료</p>
      </div>
    </div>
    <div style="background: #ffffff; border-radius: 12pt; padding: 24pt; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e5e5e0;">
      <p style="font-size: 9pt; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">TESTS PASSING</p>
      <div>
        <p style="font-size: 44pt; font-weight: 600; color: #059669; letter-spacing: -0.02em;">1,190+</p>
        <p style="font-size: 10pt; color: #888; margin-top: 6pt;">All green</p>
      </div>
    </div>
    <div style="background: #ffffff; border-radius: 12pt; padding: 24pt; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #e5e5e0;">
      <p style="font-size: 9pt; color: #888; text-transform: uppercase; letter-spacing: 0.05em;">GIT COMMITS</p>
      <div>
        <p style="font-size: 44pt; font-weight: 600; color: #1a1a1a; letter-spacing: -0.02em;">43</p>
        <p style="font-size: 10pt; color: #888; margin-top: 6pt;">자율 실행 커밋</p>
      </div>
    </div>
  </div>

  <!-- Phase 진행 바 -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 8pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; width: 140pt;">Phase 1: Architecture</p>
      <div style="flex: 1; height: 14pt; background: #e5e5e0; border-radius: 7pt; overflow: hidden;">
        <div style="width: 100%; height: 100%; background: #1a1a1a; border-radius: 7pt;"></div>
      </div>
      <p style="font-size: 9pt; color: #059669; font-weight: 600; width: 32pt;">100%</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; width: 140pt;">Phase 2: Data Layer</p>
      <div style="flex: 1; height: 14pt; background: #e5e5e0; border-radius: 7pt; overflow: hidden;">
        <div style="width: 100%; height: 100%; background: #1a1a1a; border-radius: 7pt;"></div>
      </div>
      <p style="font-size: 9pt; color: #059669; font-weight: 600; width: 32pt;">100%</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; width: 140pt;">Phase 3: Domain</p>
      <div style="flex: 1; height: 14pt; background: #e5e5e0; border-radius: 7pt; overflow: hidden;">
        <div style="width: 100%; height: 100%; background: #1a1a1a; border-radius: 7pt;"></div>
      </div>
      <p style="font-size: 9pt; color: #059669; font-weight: 600; width: 32pt;">100%</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; width: 140pt;">Phase 4: ViewModels</p>
      <div style="flex: 1; height: 14pt; background: #e5e5e0; border-radius: 7pt; overflow: hidden;">
        <div style="width: 55%; height: 100%; background: #7c3aed; border-radius: 7pt;"></div>
      </div>
      <p style="font-size: 9pt; color: #7c3aed; font-weight: 600; width: 32pt;">55%</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; width: 140pt;">Phase 5~7: UI + Test</p>
      <div style="flex: 1; height: 14pt; background: #e5e5e0; border-radius: 7pt; overflow: hidden;">
        <div style="width: 0%; height: 100%; background: #ccc; border-radius: 7pt;"></div>
      </div>
      <p style="font-size: 9pt; color: #999; font-weight: 600; width: 32pt;">0%</p>
    </div>
  </div>

  <!-- 푸터 -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12pt;">
    <p style="font-size: 9pt; color: #999;">Zipi — AI Sales CRM</p>
    <p style="font-size: 9pt; color: #999;">github.com/Shaun-Kim-maker/ralphthon_real</p>
  </div>
</body>
</html>
