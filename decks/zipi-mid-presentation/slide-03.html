<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #ffffff;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #059669; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">SOLUTION</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #1a1a1a;">Zipi가 해결합니다</h2>
    </div>
    <p style="font-size: 10pt; color: #999;">03</p>
  </div>

  <!-- 한 문장 정의 -->
  <div style="background: #f0fdf4; border-radius: 12pt; padding: 20pt; margin-bottom: 20pt; border-left: 4pt solid #059669;">
    <p style="font-size: 15pt; font-weight: 500; color: #1a1a1a; line-height: 1.5;">
      녹음 업로드 한 번이면, AI가 분석한 카드뉴스로 <span style="font-weight: 700; color: #059669;">10초 안에 고객 맥락을 파악</span>할 수 있는 Android CRM 앱
    </p>
  </div>

  <!-- 핵심 흐름 -->
  <div style="flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16pt;">
    <div style="background: #f5f5f0; border-radius: 12pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <div style="width: 32pt; height: 32pt; background: #1a1a1a; border-radius: 8pt; display: flex; align-items: center; justify-content: center; margin-bottom: 12pt;">
        <p style="color: #fff; font-size: 14pt;">1</p>
      </div>
      <div>
        <p style="font-size: 12pt; font-weight: 600; color: #1a1a1a; margin-bottom: 6pt;">녹음 업로드</p>
        <p style="font-size: 10pt; color: #888; line-height: 1.5;">고객 대화 or 사내 회의 녹음 파일 업로드</p>
      </div>
    </div>
    <div style="background: #f5f5f0; border-radius: 12pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <div style="width: 32pt; height: 32pt; background: #1a1a1a; border-radius: 8pt; display: flex; align-items: center; justify-content: center; margin-bottom: 12pt;">
        <p style="color: #fff; font-size: 14pt;">2</p>
      </div>
      <div>
        <p style="font-size: 12pt; font-weight: 600; color: #1a1a1a; margin-bottom: 6pt;">AI 자동 분석</p>
        <p style="font-size: 10pt; color: #888; line-height: 1.5;">감정, 키워드, 핵심발언, 가격, 액션아이템 추출</p>
      </div>
    </div>
    <div style="background: #f5f5f0; border-radius: 12pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <div style="width: 32pt; height: 32pt; background: #1a1a1a; border-radius: 8pt; display: flex; align-items: center; justify-content: center; margin-bottom: 12pt;">
        <p style="color: #fff; font-size: 14pt;">3</p>
      </div>
      <div>
        <p style="font-size: 12pt; font-weight: 600; color: #1a1a1a; margin-bottom: 6pt;">카드뉴스 생성</p>
        <p style="font-size: 10pt; color: #888; line-height: 1.5;">구조화된 카드뉴스로 한눈에 파악</p>
      </div>
    </div>
    <div style="background: #059669; border-radius: 12pt; padding: 18pt; display: flex; flex-direction: column; justify-content: space-between;">
      <div style="width: 32pt; height: 32pt; background: rgba(255,255,255,0.2); border-radius: 8pt; display: flex; align-items: center; justify-content: center; margin-bottom: 12pt;">
        <p style="color: #fff; font-size: 14pt;">4</p>
      </div>
      <div>
        <p style="font-size: 12pt; font-weight: 600; color: #ffffff; margin-bottom: 6pt;">10초 브리핑</p>
        <p style="font-size: 10pt; color: rgba(255,255,255,0.8); line-height: 1.5;">예상질문 + 추천답변 + 가격히스토리</p>
      </div>
    </div>
  </div>

  <!-- 킬링 포인트 -->
  <div style="display: flex; gap: 24pt; margin-top: 16pt;">
    <div style="display: flex; align-items: center; gap: 6pt;">
      <div style="width: 8pt; height: 8pt; background: #059669; border-radius: 50%;"></div>
      <p style="font-size: 10pt; color: #666;">예상 질문 + 추천 답변</p>
    </div>
    <div style="display: flex; align-items: center; gap: 6pt;">
      <div style="width: 8pt; height: 8pt; background: #059669; border-radius: 50%;"></div>
      <p style="font-size: 10pt; color: #666;">가격/조건 히스토리 추적</p>
    </div>
    <div style="display: flex; align-items: center; gap: 6pt;">
      <div style="width: 8pt; height: 8pt; background: #059669; border-radius: 50%;"></div>
      <p style="font-size: 10pt; color: #666;">고객대화 + 사내회의 통합 브리핑</p>
    </div>
  </div>
</body>
</html>
